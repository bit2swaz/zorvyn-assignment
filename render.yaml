services:
  - type: web
    name: zorvyn-assignment-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: NODE_ENV=production npx prisma migrate deploy && npm start
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false